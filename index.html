<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agent Clash</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #2a2a2a, #0f0f0f);
    color: #f2f2f2;
}

.screen {
    display: none;
    max-width: 900px;
    margin: auto;
    padding: 40px;
}

.active { display: block; }

h1, h2 { text-align: center; }

button {
    background: #ff9800;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: #1b1b1b;
    padding: 20px;
    border-radius: 10px;
    margin: 15px 0;
}

.center { text-align: center; margin-top: 30px; }

.bar {
    background: #333;
    height: 16px;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    background: #4caf50;
    height: 100%;
}
</style>
</head>

<body>

<div id="home" class="screen active">
    <h1>AGENT CLASH</h1>
    <p class="center">Competitive Resource Allocation Game</p>
    <div class="center">
        <button type="button" id="playBtn">Play Now</button>
    </div>
</div>

<div id="setup" class="screen">
    <h2>Game Setup</h2>
    <div class="card center">
        Players (1–5):
        <input id="players" type="number" min="1" max="5" value="2"><br><br>
        Rounds:
        <input id="rounds" type="number" min="1" max="10" value="5"><br><br>
        <button type="button" id="startBtn">Start Game</button>
    </div>
</div>

<div id="game" class="screen">
    <h2 id="roundTitle"></h2>
    <div id="gameArea"></div>
    <div class="center">
        <button type="button" id="endRoundBtn">End Round</button>
    </div>
</div>

<div id="result" class="screen">
    <h2>Final Results</h2>
    <div id="results"></div>
    <div class="center">
        <button type="button" id="againBtn">Play Again</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    let players, rounds, currentRound;
    let resources = [], scores = [];
    const multiplier = 1.5;

    const screens = document.querySelectorAll(".screen");

    function go(id) {
        screens.forEach(s => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }

    document.getElementById("playBtn").onclick = () => go("setup");

    document.getElementById("startBtn").onclick = () => {
        players = +document.getElementById("players").value;
        rounds = +document.getElementById("rounds").value;
        currentRound = 1;
        resources = Array(players).fill(100);
        scores = Array(players).fill(0);
        renderRound();
        go("game");
    };

    document.getElementById("endRoundBtn").onclick = endRound;
    document.getElementById("againBtn").onclick = () => go("home");

    function renderRound() {
        document.getElementById("roundTitle").innerText = "Round " + currentRound;
        const area = document.getElementById("gameArea");
        area.innerHTML = "";

        resources.forEach((r, i) => {
            const percent = Math.min((r / 200) * 100, 100);
            area.innerHTML += `
                <div class="card">
                    Player ${i + 1} | Resources: ${r}
                    <div class="bar">
                        <div class="fill" style="width:${percent}%"></div>
                    </div>
                    Contribute:
                    <input type="number" id="p${i}" min="0" max="${r}" value="0">
                </div>
            `;
        });
    }

    function endRound() {
        let pool = 0;

        for (let i = 0; i < players; i++) {
            let c = +document.getElementById(`p${i}`).value;
            c = Math.min(c, resources[i]);
            resources[i] -= c;
            pool += c;
        }

        pool = Math.floor(pool * multiplier);
        const share = Math.floor(pool / players);

        for (let i = 0; i < players; i++) {
            resources[i] += share;
            scores[i] += resources[i];
        }

        currentRound++;
        currentRound > rounds ? showResults() : renderRound();
    }
    function showResults() {
        const res = document.getElementById("results");
        res.innerHTML = "";
        const winner = scores.indexOf(Math.max(...scores)) + 1;

        scores.forEach((s, i) => {
            res.innerHTML += <div class="card">Player ${i + 1}: ${s}</div>;
        });

        res.innerHTML += <h3 class="center">🏆 Winner: Player ${winner}</h3>;
        go("result");
    }
});
</script>

</body>
</html>
