<!DOCTYPE html>
<html>
<head>
    <title>Game Setup</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h2>Game Lobby</h2>

    <div class="card center">
        <form method="post">
            <label>Number of Players (1–5)</label><br><br>
            <input type="number" name="players" min="1" max="5" required>
            <br><br>
            <button type="submit">START GAME</button>
        </form>
    </div>
</div>
</body>
</html>
